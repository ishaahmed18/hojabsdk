    * {

      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #e8dff5;
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .main-card {
      max-width: 1100px;
      width: 100%;
      background: rgba(230, 215, 245, 0.6);
      backdrop-filter: blur(2px);
      border-radius: 60px 60px 40px 40px;
      padding: 2rem 1.8rem 3rem;
      box-shadow: 0 20px 40px rgba(160, 120, 200, 0.2), 0 8px 20px rgba(180, 150, 210, 0.15);
      border: 1px solid rgba(200, 180, 230, 0.5);
      transition: all 0.2s;
    }
    /* sections */
    .page {
      display: none;
      animation: fadeGlow 0.5s ease;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeGlow {
      0% { opacity: 0.3; transform: scale(0.97); }
      100% { opacity: 1; transform: scale(1); }
    }
    /* ----- WELCOME (page 1) ----- */
    .welcome-wrap {
      text-align: center;
      padding: 1.2rem 0.5rem 0.8rem;
    }
    .welcome-wrap h1 {
      font-size: 4.2rem;
      font-weight: 700;
      color: #6b4c8a;
      letter-spacing: 2px;
      text-shadow: 4px 4px 0 #dcc8f0, 0 10px 20px rgba(160, 120, 200, 0.2);
      margin-bottom: 0.4rem;
    }
    .welcome-wrap .sub {
      font-size: 1.5rem;
      font-weight: 300;
      color: #7a5a9a;
      background: rgba(215, 195, 235, 0.5);
      display: inline-block;
      padding: 0.3rem 2.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.8rem;
    }
    .welcome-wrap .girly-icon {
      font-size: 4rem;
      letter-spacing: 10px;
      margin: 0.5rem 0;
    }
    .btn {
      background: #d4b8e8;
      border: none;
      padding: 0.9rem 2.8rem;
      border-radius: 80px;
      font-weight: 600;
      font-size: 1.4rem;
      color: #4a2d66;
      box-shadow: 0 6px 0 #b294cc, 0 12px 20px rgba(160, 120, 200, 0.25);
      cursor: pointer;
      transition: 0.08s linear;
      margin-top: 0.8rem;
      font-family: 'Quicksand', sans-serif;
      letter-spacing: 1px;
    }
    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #b294cc;
    }
    /* ----- BIRTHDAY POPPER (page2) ----- */
    .bday-pop {
      text-align: center;
      padding: 1rem 0;
    }
    .bday-pop h2 {
      font-size: 3.5rem;
      font-weight: 700;
      color: #6b4c8a;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #dcc8f0, #e8dff5);
      display: inline-block;
      padding: 0.2rem 3rem;
      border-radius: 120px;
      box-shadow: 0 6px 0 #b294cc;
    }
    .balloon-area {
      min-height: 170px;
      margin: 1.5rem 0 1rem;
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1rem 0.8rem;
    }
    .balloon {
      display: inline-block;
      font-size: 3.8rem;
      filter: drop-shadow(0 10px 12px rgba(160, 120, 200, 0.3));
      transition: all 0.2s;
      animation: floatPop 3s infinite alternate ease-in-out;
    }
    .balloon:nth-child(odd) { animation-delay: 0.2s; }
    .balloon:nth-child(3n) { animation-delay: 1s; }
    .balloon:nth-child(5n) { animation-delay: 0.7s; }
    @keyframes floatPop {
      0% { transform: translateY(0px) scale(0.9); }
      100% { transform: translateY(-25px) scale(1.1); }
    }
    .confetti-emoji {
      font-size: 2.4rem;
      margin: 0 0.2rem;
      display: inline-block;
      animation: twinkle 1.2s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }
    .bday-pop .btn {
      background: #d4b8e8;
      margin: 0.2rem 0.5rem;
    }
    /* ----- GALLERY POLAROID (page3) ----- */
    .polaroid-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.8rem 1.2rem;
      margin: 2rem 0 1.2rem;
      justify-items: center;
    }
    .polaroid {
      background: #f3ecf9;
      padding: 0.8rem 0.8rem 1.4rem;
      border-radius: 26px 26px 18px 18px;
      box-shadow: 0 12px 24px rgba(160, 120, 200, 0.15), 0 4px 8px rgba(180, 150, 210, 0.3);
      transition: 0.3s ease;
      width: 100%;
      max-width: 190px;
      cursor: pointer;
      border: 1px solid #e4d5f0;
      backdrop-filter: blur(2px);
      text-align: center;
      position: relative;
    }
    .polaroid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      background: #dcc8f0;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
      transition: 0.3s ease;
    }
    .polaroid .caption {
      font-weight: 600;
      color: #5a3d7a;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }
    /* clicked polaroid (blur bg + bigger) */
    .polaroid.expanded {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.3);
      z-index: 999;
      max-width: 450px;
      width: 85%;
      padding: 1.4rem 1.4rem 2rem;
      background: #f3ecf9;
      box-shadow: 0 40px 70px rgba(100, 60, 140, 0.5);
      border-radius: 40px;
      cursor: default;
      pointer-events: auto;
      border: 2px solid #d4b8e8;
    }
    .polaroid.expanded img {
      aspect-ratio: 1/1;
      border-radius: 24px;
      width: 100%;
      height: auto;
    }
    .polaroid.expanded .caption {
      font-size: 1.3rem;
      margin-top: 0.8rem;
      color: #4a2d66;
    }
    .blur-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      backdrop-filter: blur(10px);
      background: rgba(180, 150, 210, 0.25);
      z-index: 998;
      pointer-events: auto;
    }
    .blur-overlay.show {
      display: block;
    }
    /* close expanded */
    .close-polaroid {
      position: absolute;
      top: 8px;
      right: 18px;
      font-size: 2.2rem;
      color: #6b4c8a;
      cursor: pointer;
      background: transparent;
      border: none;
      font-weight: 300;
      z-index: 1000;
    }
    .close-polaroid:hover {
      transform: scale(1.2);
    }
    /* ----- MESSAGES ENVELOPES (page4) ----- */
    .envelope-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0 2rem;
      justify-items: center;
    }
    .envelope {
      background: #dcc8f0;
      width: 100%;
      max-width: 150px;
      aspect-ratio: 1/1.2;
      border-radius: 40px 40px 18px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 0 #b294cc, 0 12px 28px rgba(160, 120, 200, 0.2);
      cursor: pointer;
      transition: 0.15s;
      padding: 0.4rem;
      border: 1px solid #e4d5f0;
      font-size: 1rem;
      font-weight: 600;
      color: #4a2d66;
    }
    .envelope:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b294cc;
    }
    .envelope .emoji-big {
      font-size: 3.8rem;
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .envelope .label {
      background: rgba(255, 240, 250, 0.7);
      padding: 0.2rem 1.2rem;
      border-radius: 80px;
      font-size: 0.8rem;
      color: #4a2d66;
    }
    .letter-box {
      background: #f3ecf9;
      border-radius: 32px;
      padding: 1.8rem 2rem;
      margin: 1rem 0 0.5rem;
      box-shadow: inset 0 2px 8px rgba(160, 120, 200, 0.08), 0 8px 16px rgba(160, 120, 200, 0.1);
      border: 1px solid #dcc8f0;
      min-height: 100px;
      display: none;
      animation: fadeGlow 0.3s;
    }
    .letter-box.show {
      display: block;
    }
    .letter-box p {
      font-size: 1.15rem;
      color: #3a1f52;
      font-weight: 400;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .letter-box .close-letter {
      background: none;
      border: none;
      float: right;
      font-size: 1.8rem;
      color: #6b4c8a;
      cursor: pointer;
    }
    .footer-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem 1.2rem;
      margin: 2.2rem 0 0.2rem;
    }

      color: #4a2d66;
      font-size: 1rem;
      box-shadow: 0 4px 0 #b294cc;
      cursor: pointer;
      transition: 0.05s linear;

      box-shadow: 0 1px 0 #b294cc;
    }
    .footer-nav .btn-small.active-tab {
      background: #d4b8e8;
      color: #3a1f52;
    }
    /* responsive */
    @media (max-width: 640px) {
      .main-card { padding: 1.2rem; }
      .welcome-wrap h1 { font-size: 2.8rem; }
      .bday-pop h2 { font-size: 2.4rem; padding: 0.2rem 1.8rem; }
      .polaroid-grid { grid-template-columns: repeat(2, 1fr); }
      .polaroid.expanded {
        max-width: 320px;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }
  </style>
</head>

    function showPage(pageId) {
      Object.keys(pages).forEach(key => {
        pages[key].classList.toggle('active', key === pageId);
      });
      // close any expanded polaroid & blur

      // hide letter box

    }

    // ---------- POLAROID ----------
    function renderPolaroids() {
      polaroidGrid.innerHTML = '';
      galleryData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'polaroid';
        div.dataset.index = idx;
        div.innerHTML = `<img src="${item.src}" alt="polaroid" loading="lazy">
                        <div class="caption">${item.caption}</div>`;
        div.addEventListener('click', function(e) {
          e.stopPropagation();
          expandPolaroid(this);
        });
        polaroidGrid.appendChild(div);
      });
    }

    let expandedElement = null;
    function expandPolaroid(el) {

        closeExpandedPolaroid();
        if (expandedElement === el) return;

      // blur overlay
      blurOverlay.classList.add('show');
      el.classList.add('expanded');

      closeBtn.innerHTML = '✕';

      });
      el.appendChild(closeBtn);
      expandedElement = el;

      // click on overlay closes
      blurOverlay.onclick = function() {
        closeExpandedPolaroid();
      };
      // escape key
      document.addEventListener('keydown', handleEsc);
    }

    function closeExpandedPolaroid() {
      if (expandedElement) {
        expandedElement.classList.remove('expanded');
        const closeBtn = expandedElement.querySelector('.close-polaroid');
        if (closeBtn) closeBtn.remove();
        expandedElement = null;
        blurOverlay.classList.remove('show');
        blurOverlay.onclick = null;
        document.removeEventListener('keydown', handleEsc);
      }
    }
    function handleEsc(e) {
      if (e.key === 'Escape') closeExpandedPolaroid();
    }

    // ---------- ENVELOPES ----------
    function renderEnvelopes() {
      envelopeGrid.innerHTML = '';
      const emojis = ['💌', '🌸', '✨', '🎀', '🍬', '💖'];
      messages.forEach((msg, i) => {
        const env = document.createElement('div');
        env.className = 'envelope';
        env.dataset.index = i;
        env.innerHTML = `<div class="emoji-big">${emojis[i % emojis.length]}</div>
                         <span class="label">envelope ${i+1}</span>`;
        env.addEventListener('click', function() {
          const idx = parseInt(this.dataset.index);
          letterContent.textContent = messages[idx] || '💕 bestie!';
          letterDisplay.classList.add('show');
          // auto scroll to letter
          letterDisplay.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
        envelopeGrid.appendChild(env);
      });
    }

    // close letter
    closeLetter.addEventListener('click', function() {
      letterDisplay.classList.remove('show');
    });

    // ---------- NAVIGATION ----------
    goToBday.addEventListener('click', function() {
      showPage('page2');
    });
    goToGallery.addEventListener('click', function() {
      showPage('page3');
      renderPolaroids();
    });
    backToBday.addEventListener('click', function() {
      showPage('page2');
    });
    goToMessages.addEventListener('click', function() {
      showPage('page4');
      renderEnvelopes();
      letterDisplay.classList.remove('show');
    });
    backToGallery.addEventListener('click', function() {
      showPage('page3');
      renderPolaroids();
    });

    // close expanded if page changes (already in showPage)
    // override showPage to close polaroid
    const originalShow = showPage;
    showPage = function(pageId) {
      closeExpandedPolaroid();
      letterDisplay.classList.remove('show');
      originalShow(pageId);
    };
    // rebind navigation to new showPage
    goToBday.onclick = function() { showPage('page2'); };
    goToGallery.onclick = function() { showPage('page3'); renderPolaroids(); };
    backToBday.onclick = function() { showPage('page2'); };
    goToMessages.onclick = function() { showPage('page4'); renderEnvelopes(); letterDisplay.classList.remove('show'); };
    backToGallery.onclick = function() { showPage('page3'); renderPolaroids(); };

    // initial render for gallery & envelopes (hidden but ready)
    renderPolaroids();
    renderEnvelopes();

    // close expanded on resize (optional)
    window.addEventListener('resize', closeExpandedPolaroid);

    console.log('🌸 happy birthday behn ki lorry 🎂');
  })();
</script>
</body>
</html>
